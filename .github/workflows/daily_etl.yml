name: Daily Market Data ETL

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 평일 매일 18:00 KST (UTC 09:00)
  workflow_dispatch:

jobs:
  daily-market-update:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. Python 3.10 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 일배치 실행 (KRX 시장 데이터 갱신, ~3분)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python etl/daily_market_batch.py

      - name: 5. 갱신된 DB 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/finance.db
          git diff --staged --quiet || (git commit -m "🤖 daily: KRX 시장 데이터 갱신" && git push)
