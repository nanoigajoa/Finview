name: Quarterly DART Financial ETL

on:
  schedule:
    # 사업보고서 공시 시즌 후: 2월 / 5월 / 8월 / 11월 15일 18:00 KST
    - cron: '0 9 15 2,5,8,11 *'
  workflow_dispatch:  # 수동 실행 (공시 지연 시 대응)

jobs:
  quarterly-dart-update:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # DART 벌크 수집 최대 60분 허용

    steps:
      - name: 1. 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. Python 3.10 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 분기배치 실행 (DART 전 종목 재무데이터, ~10~20분)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python etl/quarterly_dart_batch.py

      - name: 5. 분기 데이터로 screener_summary 즉시 갱신
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python etl/daily_market_batch.py

      - name: 6. 갱신된 DB 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/finance.db
          git diff --staged --quiet || (git commit -m "🤖 quarterly: DART 재무 품질 데이터 갱신" && git push)
