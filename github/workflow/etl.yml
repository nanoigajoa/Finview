name: Daily Finance Data ETL Pipeline

on:
  schedule:
    # 매일 UTC 09:00 (한국 시간 18:00)에 실행하여 당일 공시 데이터 수집
    - cron: '0 9 * * *'
  workflow_dispatch: # 깃허브 웹페이지에서 수동으로 버튼을 눌러 실행할 수 있는 옵션

jobs:
  run-etl-and-update-db:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 코드 체크아웃
        uses: actions/checkout@v3

      - name: 2. 파이썬 환경 설정 (3.10)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 파이썬 배치 스크립트 실행
        env:
          # 깃허브 Repository Secrets에 저장해둔 API 키를 주입
          DART_API_KEY: ${{ secrets.DART_API_KEY }} 
        run: |
          python etl/batch_job.py

      - name: 5. 갱신된 DB 파일을 저장소에 커밋 및 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/finance.db
          
          # DB 파일에 변경사항이 있을 때만 커밋하여 에러 방지
          git diff --staged --quiet || (git commit -m "🤖 Auto-update: 최신 재무 데이터 적재 완료" && git push)