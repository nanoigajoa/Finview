<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>멀티팩터 스크리너</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 필터 그리드가 많아졌으므로 4열 배치로 수정 */
        .filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 96%; padding-top: 50px;"> <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #334155; padding-bottom: 20px;">
            <h1 style="margin: 0; font-size: 28px; cursor: pointer;" onclick="location.href='index.html'">📊 Quant Analyzer <span style="font-size: 20px; color: #94a3b8;">| Screener</span></h1>
        </header>

        <div style="background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color);">
            <h3 style="color: #f1f5f9; margin-top: 0; margin-bottom: 20px;">1. 가치 및 규모 필터</h3>
            <div class="filter-grid">
                <div class="filter-item">
                    <label for="filter-roe">최소 ROE (%)</label>
                    <input type="number" id="filter-roe" placeholder="예: 15">
                </div>
                <div class="filter-item">
                    <label for="filter-per">최대 PER (배)</label>
                    <input type="number" id="filter-per" placeholder="예: 10">
                </div>
                <div class="filter-item">
                    <label for="filter-pbr">최대 PBR (배)</label>
                    <input type="number" id="filter-pbr" placeholder="예: 1.5">
                </div>
                <div class="filter-item">
                    <label for="filter-cap">최소 시가총액 (억원)</label>
                    <input type="number" id="filter-cap" placeholder="예: 2000">
                </div>
            </div>

            <h3 style="color: #f1f5f9; margin-top: 30px; margin-bottom: 20px;">2. 성장성 및 퀄리티(건전성) 필터</h3>
            <div class="filter-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
                <div class="filter-item">
                    <label for="filter-rev-cagr">최소 매출 CAGR 3년 (%)</label>
                    <input type="number" id="filter-rev-cagr" placeholder="예: 10">
                </div>
                <div class="filter-item">
                    <label for="filter-op-cagr">최소 영업이익 CAGR 3년 (%)</label>
                    <input type="number" id="filter-op-cagr" placeholder="예: 15">
                </div>
                <div class="filter-item">
                    <label for="filter-debt">최대 부채비율 (%)</label>
                    <input type="number" id="filter-debt" placeholder="예: 100">
                </div>
                <div class="filter-item">
                    <label for="filter-peg" style="color: #f59e0b; font-weight: bold;">최대 PEG (배) 🔥</label>
                    <input type="number" step="0.1" id="filter-peg" placeholder="예: 1.0 (고성장 저평가)">
                </div>
            </div>
            
            <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <label for="filter-inst" style="color: #f1f5f9; font-size: 15px; cursor: pointer; display: flex; align-items: center; margin-bottom: 10px;">
                        <input type="checkbox" id="filter-inst" style="width: 18px; height: 18px; margin-right: 10px; cursor: pointer;"> 
                        최근 1개월 기관 누적 순매수 종목만 보기
                    </label>
                    <label for="filter-ocf" style="color: #f1f5f9; font-size: 15px; cursor: pointer; display: flex; align-items: center;">
                        <input type="checkbox" id="filter-ocf" style="width: 18px; height: 18px; margin-right: 10px; cursor: pointer;"> 
                        최근 3년 연속 순이익 흑자 기업만 보기 (OCF Proxy)
                    </label>
                </div>
                <button id="runScreenerBtn" style="padding: 14px 35px; font-size: 18px; border-radius: 8px; background: var(--accent-color); color: white; border: none; cursor: pointer; font-weight: bold;">조건 발굴 🚀</button>
            </div>

            <h3 style="color: #f1f5f9; margin-top: 30px; margin-bottom: 20px;">3. 산업 대비 상대 가치 (Peer Group)</h3>
            <div class="filter-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="filter-item">
                    <label for="filter-rel-per">최소 PER 할인율 (%)</label>
                    <input type="number" id="filter-rel-per" placeholder="예: 20 (산업평균 대비 20% 저렴)">
                </div>
                <div class="filter-item" style="display: flex; align-items: flex-end; padding-bottom: 10px;">
                    <label for="filter-rel-roe" style="color: #f1f5f9; font-size: 15px; cursor: pointer; display: flex; align-items: center;">
                        <input type="checkbox" id="filter-rel-roe" style="width: 18px; height: 18px; margin-right: 10px; cursor: pointer;"> 
                        🌟 내 기업 ROE ≥ 산업 평균 ROE
                    </label>
                </div>
                <div class="filter-item" style="display: flex; align-items: flex-end; padding-bottom: 10px;">
                    <label for="filter-rel-growth" style="color: #f1f5f9; font-size: 15px; cursor: pointer; display: flex; align-items: center;">
                        <input type="checkbox" id="filter-rel-growth" style="width: 18px; height: 18px; margin-right: 10px; cursor: pointer;"> 
                        🌟 내 기업 매출성장률 ≥ 산업 평균
                    </label>
                </div>
            </div>
            
            <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
            </div>
        </div>

<div id="screener-results" style="margin-top: 40px; display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px;">
                <h3 style="color: #94a3b8; margin: 0;">검색 결과: <span id="result-count" style="color: #fff;">0</span>건</h3>
                <input type="text" id="quickFilter" placeholder="결과 내 종목명 검색..." style="padding: 8px 15px; border-radius: 20px; border: 1px solid #334155; background: #0f172a; color: #fff;">
            </div>
            
            <div style="max-height: 700px; overflow-y: auto; overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color);">
                <table style="width: 100%; min-width: 1000px; border-collapse: collapse; color: #f1f5f9; text-align: left; background: var(--card-bg); font-size: 14px;">
                    <thead style="background: #1e293b; position: sticky; top: 0; user-select: none; z-index: 10;">
                        <tr>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('corp_name')">종목명 ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('sector_name')">섹터 ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('PER')">PER ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('PBR')">PBR ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('median_pbr')">업종평균(PBR) ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('ROE')">ROE ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('rev_cagr_3y')">매출CAGR ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('op_cagr_3y')">영익CAGR ↕️</th>
                            <th style="padding: 15px; border-bottom: 1px solid #334155; cursor: pointer;" onclick="window.sortTable('debt_ratio')">부채비율 ↕️</th>
                        </tr>
                    </thead>
                    <tbody id="result-tbody"></tbody>
                </table>
            </div>
            
            <div id="pagination-controls" style="display: flex; justify-content: center; margin-top: 25px; gap: 8px;"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
