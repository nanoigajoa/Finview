<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>퀀트 펀더멘털 포털</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column;">
    
    <div style="text-align: center; width: 100%; max-width: 600px;">
        <h1 style="font-size: 3.5rem; margin-bottom: 40px; color: #ffffff; text-shadow: 0 0 20px rgba(59, 130, 246, 0.6);">
            📊 Quant Analyzer
        </h1>
        
        <div class="search-bar" style="transform: scale(1.2); justify-content: center; margin-bottom: 30px;">
            <input type="text" id="searchInput" placeholder="기업명 또는 종목코드 (예: 삼성전자)">
            <button id="searchBtn">분석 시작</button>
        </div>

        <div style="margin-top: 40px;">
            <p style="color: #94a3b8; margin-bottom: 15px;">조건에 맞는 저평가 우량주를 찾고 싶다면?</p>
            <button onclick="location.href='screener.html'" style="padding: 15px 30px; font-size: 18px; border-radius: 30px; background: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); cursor: pointer; font-weight: bold; transition: 0.3s;" onmouseover="this.style.background='rgba(59, 130, 246, 0.1)'" onmouseout="this.style.background='transparent'">
                🎯 퀀트 스크리너 입장하기
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
