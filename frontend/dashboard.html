<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기업 분석 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div class="container">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px;">
            <h1 style="margin: 0; font-size: 24px; cursor: pointer;" onclick="location.href='index.html'">📊 Quant Analyzer</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="다른 기업 검색">
                <button id="searchBtn">검색</button>
            </div>
        </header>

        <div id="dashboard-content">
            <section class="kpi-container" id="kpiArea">
                <div class="kpi-card"><h3>매출액</h3><p id="kpi-rev">-</p></div>
                <div class="kpi-card"><h3>영업이익</h3><p id="kpi-op">-</p></div>
                <div class="kpi-card"><h3>ROE</h3><p id="kpi-roe">-</p></div>
                <div class="kpi-card"><h3>부채비율</h3><p id="kpi-debt">-</p></div>
            </section>

            <div class="section-title">
                <h2>📈 실시간 시장 지표 <span id="market-date" style="font-size:14px; color:#94a3b8; font-weight:normal;"></span></h2>
            </div>
            <section class="kpi-container market-kpi">
                <div class="kpi-card mini"><h3>PER</h3><p id="kpi-per">-</p></div>
                <div class="kpi-card mini"><h3>PBR</h3><p id="kpi-pbr">-</p></div>
                <div class="kpi-card mini"><h3>EPS</h3><p id="kpi-eps">-</p></div>
                <div class="kpi-card mini"><h3>배당수익률(DIV)</h3><p id="kpi-div">-</p></div>
            </section>

            <div class="tabs">
                <button class="tab-btn active" onclick="openTab('growth')">🟢 Growth</button>
                <button class="tab-btn" onclick="openTab('profit')">🔵 Profitability</button>
                <button class="tab-btn" onclick="openTab('stability')">🟡 Stability</button>
                <button class="tab-btn" onclick="openTab('cashflow')">🟣 Cash Flow</button>
            </div>

            <main class="chart-container">
                <div id="growth" class="tab-content active"><div id="chart-growth"></div></div>
                <div id="profit" class="tab-content"><div id="chart-profit"></div></div>
                <div id="stability" class="tab-content"><div id="chart-stability"></div></div>
                <div id="cashflow" class="tab-content"><div id="chart-cashflow"></div></div>
            </main>

            <div class="section-title" style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center;">
                <h2>🔥 공매도 트래커 & 세력 수급</h2>
                <div class="time-slicer">
                    <button class="slice-btn" onclick="renderSentiment('1W')">1주일</button>
                    <button class="slice-btn" onclick="renderSentiment('1M')">1개월</button>
                    <button class="slice-btn active" onclick="renderSentiment('3M')">3개월</button>
                </div>
            </div>
            <div class="sentiment-container">
                <div id="chart-shorting" class="sentiment-chart"></div>
                <div id="chart-smartmoney" class="sentiment-chart"></div>
            </div>            
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
